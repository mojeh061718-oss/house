<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="theme-color" content="#1d2129"/>
  <meta name="description" content="Professional 2D/3D home design studio: draw floor plans, place furniture and appliances, and walk through your home in real-time 3D."/>
  <title>HavenPlan — Home Design Studio</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233884ff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M3 11.5 12 4l9 7.5'/%3E%3Cpath d='M5.5 10v9.5h13V10'/%3E%3Cpath d='M10 19.5v-5.5h4v5.5'/%3E%3C/svg%3E"/>
  <link rel="manifest" href="./manifest.webmanifest"/>
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="HavenPlan"/>
  <link rel="stylesheet" href="/src/styles.css"/>
</head>
<body>
  <div id="app">
    <header id="topbar"></header>
    <div id="workspace">
      <aside id="catalog" class="panel"></aside>
      <main id="viewport" data-mode="2d">
        <div id="plan-wrap"><canvas id="plan"></canvas></div>
        <div id="view3d"></div>
      </main>
      <aside id="props" class="panel"></aside>
    </div>
    <footer id="status"></footer>
  </div>
  <script type="module" src="/src/main.js"></script>

</html>
