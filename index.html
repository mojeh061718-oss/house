<!doctype html>

<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>

  <meta name="description" content="Honeycutt Home Studio — professional 2D/3D home design: draw floor plans, place furniture and appliances, and walk through your home in real-time 3D."/>
  <title>Honeycutt Home Studio</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233884ff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M3 11.5 12 4l9 7.5'/%3E%3Cpath d='M5.5 10v9.5h13V10'/%3E%3Cpath d='M10 19.5v-5.5h4v5.5'/%3E%3C/svg%3E"/>

</head>
<body>
  <div id="splash">
      <!-- Simple, always-visible logo screen (no draw animation). Everything is
           painted via inline SVG attributes so it shows even if CSS is odd, and
           it stays up while the app loads, then fades to the home screen. -->
      <div class="splash-inner">
        <svg class="splash-logo" viewBox="0 0 300 232" fill="none"
             stroke="#9cc0ff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <defs>
            <radialGradient id="warm" cx="0.5" cy="0.42" r="0.8">
              <stop offset="0" stop-color="#ffd98a" stop-opacity="0.85"/>
              <stop offset="1" stop-color="#ffb35c" stop-opacity="0"/>
            </radialGradient>
          </defs>
          <rect class="sp-glow" x="92" y="100" width="116" height="70" rx="2" fill="url(#warm)" stroke="none"/>
          <path class="sp-roof" pathLength="1" stroke="#b9d2ff" d="M74 106 L150 60 L226 106"/>
          <path class="sp-body" pathLength="1" d="M92 170 L92 100 M208 170 L208 100 M88 170 L212 170"/>
          <path class="sp-door" pathLength="1" d="M134 170 L134 132 L166 132 L166 170"/>
          <rect class="sp-win" x="104" y="116" width="20" height="20" rx="1.5" fill="#ffcf85" stroke="none"/>
          <rect class="sp-win" x="176" y="116" width="20" height="20" rx="1.5" fill="#ffcf85" stroke="none"/>
          <rect class="sp-winframe" x="104" y="116" width="20" height="20" rx="1.5"/>
          <rect class="sp-winframe" x="176" y="116" width="20" height="20" rx="1.5"/>
        </svg>
        <h1>Honeycutt <b>Home&nbsp;Studio</b></h1>
        <div class="splash-spinner" aria-hidden="true"></div>
        <div class="splash-ver" id="splashVer"></div>
      </div>
    </div>
    <script>
      // Splash timing + failsafe. The animations auto-play from CSS (no JS
      // needed), so mark when the page started so the app can hold the splash
      // for its full run measured from here, not from whenever the module boots.
      window.__splashT0 = Date.now();
      // Enhancement-only motion: the logo is ALWAYS visible from frame zero;
      // adding .play (after first paint) lets CSS animate the draw-in for
      // users without reduced-motion. If this script or CSS fails, the static
      // logo simply stays — visibility never depends on the animation.
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          var s = document.getElementById('splash');
          if (s) s.classList.add('play');
        });
      });
      // If the home screen never appears, the app module failed to boot (e.g. a
      // stale cached index.html pointing at a JS bundle a newer deploy already
      // purged → 404). Two-stage failsafe: a gentle "Still loading…" note, then
      // a reload button. BOTH retract the moment the app actually boots — on a
      // slow first load the app can finish after the failsafe fires, and the
      // user must never see a reload button over a working app.
      (function () {
        var booted = function () {
          var home = document.getElementById('home');
          return home && !home.classList.contains('hidden');
        };
        var note = null, btn = null;
        var retract = setInterval(function () {
          if (!booted()) return;
          if (note) note.remove();
          if (btn) btn.remove();
          clearInterval(retract);
        }, 400);
        setTimeout(function () {
          if (booted()) return;
          var s = document.getElementById('splash');
          if (!s) return;
          note = document.createElement('div');
          note.id = 'splash-slow';
          note.style.cssText = 'position:absolute;left:0;right:0;bottom:12%;text-align:center;z-index:3;color:#8fa3c0;font:500 13px system-ui,sans-serif';
          note.textContent = 'Still loading…';
          s.appendChild(note);
        }, 4000);
        setTimeout(function () {
          if (booted()) return;
          var s = document.getElementById('splash');
          if (!s) return;
          if (note) note.remove();
          btn = document.createElement('div');
          btn.id = 'splash-recover';
          btn.style.cssText = 'position:absolute;left:0;right:0;bottom:8%;text-align:center;z-index:3;font:600 13px system-ui,sans-serif';
          btn.innerHTML = '<button onclick="location.reload()" style="background:#2563eb;color:#fff;border:0;border-radius:20px;padding:10px 22px;font:inherit">Tap to reload</button>';
          s.appendChild(btn);
        }, 7000);
      })();
    </script>
  <div id="app">
    <div id="home" class="hidden"></div>
    <div id="studio" class="hidden">
      <header id="topbar"></header>
      <div id="workspace">
        <nav id="toolrail"></nav>
        <main id="viewport" data-mode="2d">
          <div id="plan-wrap"><canvas id="plan"></canvas></div>
          <div id="view3d"></div>
        </main>
      </div>
      <aside id="catalog" class="drawer left"></aside>
      <aside id="props" class="drawer right"></aside>
      <div id="hintPill" class="hidden"></div>
      <div id="fabCluster"></div>
      <div id="toast"></div>
    </div>
  </div>
</body>
</html>
